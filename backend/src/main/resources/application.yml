spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/tourismdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  h2:
    console:
      enabled: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktbXVzdC1iZS1hdC1sZWFzdC0zMi1ieXRlcy1sb25nLXNlY3JldA==}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:3600}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@event.local}
    password: ${APP_ADMIN_PASSWORD:admin123}
