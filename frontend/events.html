<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>События</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
      <div>
        <p class="section-label mb-1">Афиша</p>
        <h1 class="page-title h2 mb-0">Все события</h1>
      </div>
    </div>

    <section class="card page-card p-3 p-md-4 mb-4">
      <h2 class="h5 mb-3">Фильтрация</h2>
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label" for="filterType">Тип мероприятия</label>
          <select class="form-select" id="filterType">
            <option value="">Все типы</option>
            <option value="бизнес">Бизнес</option>
            <option value="фестиваль">Фестиваль</option>
            <option value="музыка">Музыка</option>
            <option value="творчество">Творчество</option>
            <option value="концерты">Концерты</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label" for="filterFrom">Дата от</label>
          <input class="form-control" type="date" id="filterFrom" />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="filterTo">Дата до</label>
          <input class="form-control" type="date" id="filterTo" />
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-outline-secondary" id="resetFilters" type="button">Сбросить</button>
        </div>
      </div>
    </section>

    <div class="row g-4" id="eventsList"></div>
    <div class="d-flex justify-content-center mt-4" id="eventsPagination"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
