<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>События</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <p class="section-label mb-1">Афиша</p>
        <h1 class="page-title h2 mb-0">Все события</h1>
      </div>
    </div>

    <div class="card page-card p-3 mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label" for="typeFilter">Тип события</label>
          <select id="typeFilter" class="form-select">
            <option value="all">Все типы</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="dateFromFilter">Дата с</label>
          <input id="dateFromFilter" class="form-control" type="date" />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="dateToFilter">Дата по</label>
          <input id="dateToFilter" class="form-control" type="date" />
        </div>
      </div>
    </div>

    <div id="eventsGrid" class="row g-4"></div>
    <div id="eventsPagination" class="d-flex gap-2 mt-4"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
