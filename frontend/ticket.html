<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Покупка билета</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Checkout</p>
          <h1 class="page-title h3">Покупка билета</h1>
          <p class="mb-3">Событие: <strong id="ticketEventTitle"></strong></p>
          <form id="ticketForm" class="needs-validation" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="ticketType">Тип билета</label>
                <select class="form-select" id="ticketType" required>
                  <option value="1">Standard ×1</option>
                  <option value="1.5">Premium ×1.5</option>
                  <option value="2">VIP ×2</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="ticketQty">Количество</label>
                <input class="form-control" id="ticketQty" type="number" min="1" max="10" value="1" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="buyerEmail">Email покупателя</label>
                <input class="form-control" id="buyerEmail" type="email" required />
                <div class="invalid-feedback">Введите корректный email.</div>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center p-3 bg-light rounded-3 mt-4">
              <span>Итого к оплате:</span>
              <strong id="ticketTotal">0 ₽</strong>
            </div>
            <button class="btn btn-primary w-100 mt-3" type="submit">Купить билет</button>
            <div data-feedback></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
