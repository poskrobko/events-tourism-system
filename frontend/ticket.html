<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Покупка билета</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Покупка</p>
          <h1 class="page-title h3 mb-1">Купить билет</h1>
          <p class="text-secondary" id="ticketEventLabel"></p>
          <form id="ticketForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="ticketType">Тип билета</label>
                <select class="form-select" id="ticketType" required>
                  <option value="standard">Standard</option>
                  <option value="premium">Premium</option>
                  <option value="vip">VIP</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="ticketQty">Количество</label>
                <input class="form-control" id="ticketQty" type="number" min="1" max="10" value="1" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="buyerEmail">Email покупателя</label>
                <input class="form-control" id="buyerEmail" type="email" required />
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center p-3 bg-light rounded-3 mt-4">
              <span>Итого:</span>
              <strong id="ticketTotal"></strong>
            </div>
            <button class="btn btn-primary w-100 mt-3" type="submit">Подтвердить покупку</button>
            <div id="ticketFeedback"></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
