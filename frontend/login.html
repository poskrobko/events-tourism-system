<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div class="navbar-nav ms-auto gap-2">
        <a class="nav-link active" href="login.html">Вход</a>
        <a class="nav-link" href="register.html">Регистрация</a>
        <a class="nav-link" href="forgot-password.html">Восстановление</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Добро пожаловать</p>
          <h1 class="page-title h3 mb-4">Вход в аккаунт</h1>
          <form class="needs-validation" novalidate data-success-message="Вы успешно вошли в систему.">
            <div class="mb-3">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" type="email" required />
              <div class="invalid-feedback">Укажите корректный email.</div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Пароль</label>
              <input class="form-control" id="password" type="password" minlength="6" required />
              <div class="invalid-feedback">Минимум 6 символов.</div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Войти</button>
            <div data-feedback></div>
          </form>
          <div class="d-flex justify-content-between mt-3 small">
            <a href="forgot-password.html" class="link-secondary">Забыли пароль?</a>
            <a href="register.html" class="link-secondary">Создать аккаунт</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
