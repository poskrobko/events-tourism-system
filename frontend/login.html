<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Авторизация</p>
          <h1 class="page-title h3 mb-3">Вход в систему</h1>
          <p class="small text-secondary">Для админа: логин <strong>admin123</strong>, пароль <strong>admin123</strong>.</p>
          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="loginValue">Email или логин</label>
              <input class="form-control" id="loginValue" required minlength="3" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="loginPassword">Пароль</label>
              <input class="form-control" id="loginPassword" type="password" required minlength="6" />
            </div>
            <button class="btn btn-primary w-100" type="submit">Войти</button>
            <div id="loginFeedback"></div>
          </form>
          <div class="d-flex justify-content-between mt-3 small">
            <a href="forgot-password.html" class="link-secondary">Восстановить пароль</a>
            <a href="register.html" class="link-secondary">Регистрация</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
