<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div class="navbar-nav ms-auto gap-2">
        <a class="nav-link" href="login.html">Вход</a>
        <a class="nav-link active" href="register.html">Регистрация</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Новый пользователь</p>
          <h1 class="page-title h3 mb-4">Создание аккаунта</h1>
          <form class="needs-validation" novalidate data-success-message="Регистрация успешна. Подтвердите email.">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="firstName">Имя</label>
                <input class="form-control" id="firstName" required />
                <div class="invalid-feedback">Введите имя.</div>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="lastName">Фамилия</label>
                <input class="form-control" id="lastName" required />
                <div class="invalid-feedback">Введите фамилию.</div>
              </div>
              <div class="col-12">
                <label class="form-label" for="regEmail">Email</label>
                <input class="form-control" id="regEmail" type="email" required />
                <div class="invalid-feedback">Нужен корректный email.</div>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="regPassword">Пароль</label>
                <input class="form-control" id="regPassword" type="password" minlength="8" required />
                <div class="invalid-feedback">Минимум 8 символов.</div>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="phone">Телефон</label>
                <input class="form-control" id="phone" type="tel" pattern="\+?[0-9\-\s]{10,18}" required />
                <div class="invalid-feedback">Введите номер телефона.</div>
              </div>
            </div>
            <button class="btn btn-primary w-100 mt-4" type="submit">Зарегистрироваться</button>
            <div data-feedback></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
