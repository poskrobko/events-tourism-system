<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Новый пользователь</p>
          <h1 class="page-title h3 mb-4">Регистрация</h1>
          <form id="registerForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label" for="firstName">Имя</label><input class="form-control" id="firstName" required minlength="2" /></div>
              <div class="col-md-6"><label class="form-label" for="lastName">Фамилия</label><input class="form-control" id="lastName" required minlength="2" /></div>
              <div class="col-md-6"><label class="form-label" for="regUsername">Логин</label><input class="form-control" id="regUsername" required minlength="3" pattern="[A-Za-z0-9_]{3,20}" /></div>
              <div class="col-md-6"><label class="form-label" for="phone">Телефон</label><input class="form-control" id="phone" required pattern="\+?[0-9\-\s]{10,18}" /></div>
              <div class="col-12"><label class="form-label" for="regEmail">Email</label><input class="form-control" id="regEmail" type="email" required /></div>
              <div class="col-md-6"><label class="form-label" for="regPassword">Пароль</label><input class="form-control" id="regPassword" type="password" required minlength="6" /></div>
              <div class="col-md-6"><label class="form-label" for="regPassword2">Подтверждение пароля</label><input class="form-control" id="regPassword2" type="password" required minlength="6" /></div>
            </div>
            <button class="btn btn-primary w-100 mt-4" type="submit">Создать аккаунт</button>
            <div id="registerFeedback"></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
