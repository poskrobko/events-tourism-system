<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Детали события</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4 align-items-start">
      <div class="col-lg-8">
        <img id="eventImage" src="" class="img-fluid rounded-4 shadow-sm mb-4" alt="Событие" />
        <p id="eventType" class="section-label mb-2"></p>
        <h1 id="eventTitle" class="page-title h2"></h1>
        <p id="eventDescription" class="lead"></p>
        <div class="row row-cols-1 row-cols-md-3 g-3 mb-4">
          <div class="col"><div id="eventDate" class="p-3 bg-white rounded-3 border"></div></div>
          <div class="col"><div id="eventTime" class="p-3 bg-white rounded-3 border"></div></div>
          <div class="col"><div id="eventCity" class="p-3 bg-white rounded-3 border"></div></div>
        </div>
        <div class="card page-card p-3">
          <h2 class="h5 mb-3">Программа мероприятия</h2>
          <ul id="eventSchedule" class="list-group list-group-flush"></ul>
        </div>
      </div>
      <aside class="col-lg-4">
        <div class="card page-card">
          <div class="card-header card-header-themed">Быстрая информация</div>
          <div class="card-body">
            <p class="mb-4"><strong>Цена от:</strong> <span id="eventPrice"></span></p>
            <a id="buyTicketBtn" class="btn btn-primary w-100" href="ticket.html">Купить билет</a>
          </div>
        </div>
      </aside>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
