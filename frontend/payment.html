<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тестовая оплата</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card page-card p-4">
          <h1 class="page-title h3 mb-4" id="paymentTitle">Оплата заказа</h1>
          <div class="mb-4">
            <p class="mb-2"><strong>Мероприятие:</strong> <span id="paymentEvent"></span></p>
            <p class="mb-2"><strong>Билет:</strong> <span id="paymentTicketType"></span></p>
            <p class="mb-2"><strong>Количество:</strong> <span id="paymentQty"></span></p>
            <p class="mb-0"><strong>Сумма:</strong> <span id="paymentTotal"></span></p>
          </div>

          <p class="fw-semibold">Выберите результат тестовой оплаты:</p>
          <div class="d-grid gap-2 d-md-flex">
            <button id="paySuccessBtn" class="btn btn-success">Оплатить успешно</button>
            <button id="payDeclineBtn" class="btn btn-danger">Отклонить оплату</button>
            <button id="payFailBtn" class="btn btn-warning">Оплатить позже</button>
            <a id="payBackBtn" class="btn btn-outline-secondary" href="ticket.html">Вернуться назад</a>
          </div>
          <div id="paymentFeedback" class="mt-3"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
