<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои билеты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="card page-card p-4">
      <h1 class="h3">Мои билеты</h1>
      <h2 class="h5 mt-4">Мои билеты</h2>
      <ul id="myTicketsList" class="list-group list-group-flush mt-2"></ul>
      <h2 class="h5 mt-4">Мои заказы</h2>
      <ul id="myOrdersPendingList" class="list-group list-group-flush mt-2"></ul>
      <h2 class="h5 mt-4">Завершенные события</h2>
      <ul id="myCompletedTicketsList" class="list-group list-group-flush mt-2"></ul>
    </div>
  </main>

  <div class="modal fade" id="refundConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Подтверждение возврата</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          Вы уверены, что хотите вернуть билет?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Нет</button>
          <button type="button" class="btn btn-danger" id="confirmRefundBtn">Да</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
