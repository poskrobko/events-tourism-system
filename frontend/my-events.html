<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мои мероприятия</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>
  <main id="managerEventsPanel" class="container py-5">
    <div class="card page-card p-4 mb-4">
      <h1 class="h3 mb-3">Мои мероприятия</h1>
      <form id="managerEventForm" class="row g-3">
        <input type="hidden" id="managerEventId" />
        <div class="col-md-6"><input id="managerEventTitle" class="form-control" placeholder="Название" required /></div>
        <div class="col-md-6"><input id="managerEventCity" class="form-control" placeholder="Город" required /></div>
        <div class="col-12"><input id="managerEventVenue" class="form-control" placeholder="Место проведения" required /></div>
        <div class="col-12"><textarea id="managerEventDescription" class="form-control" placeholder="Описание" required></textarea></div>
        <div class="col-12"><input id="managerEventImageUrl" class="form-control" type="url" placeholder="Ссылка на изображение (https://...)" /></div>
        <div class="col-md-6"><input id="managerEventStart" class="form-control" type="datetime-local" required /></div>
        <div class="col-md-6"><input id="managerEventEnd" class="form-control" type="datetime-local" required /></div>
        <div class="col-md-4"><input id="managerTicketName" class="form-control" placeholder="Тип билета (например, Standard)" /></div>
        <div class="col-md-4"><input id="managerTicketPrice" class="form-control" type="number" min="0" step="0.01" placeholder="Цена билета" /></div>
        <div class="col-md-4"><input id="managerTicketQuantity" class="form-control" type="number" min="1" placeholder="Доступно билетов" /></div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Сохранить</button>
          <button class="btn btn-outline-secondary" type="button" id="managerEventFormReset">Сбросить</button>
        </div>
      </form>
    </div>
    <div class="card page-card p-4">
      <h2 class="h5 mb-3">Список моих мероприятий</h2>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Название</th><th>Город</th><th>Дата</th><th>Доступно билетов</th><th></th></tr></thead>
          <tbody id="managerEventsTable"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
