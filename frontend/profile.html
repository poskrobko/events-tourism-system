<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card page-card p-4 text-center">
          <img src="https://ui-avatars.com/api/?name=User&background=FFD150&color=3d2a00&size=120" class="rounded-circle mx-auto mb-3" alt="avatar" width="120" height="120" />
          <h1 class="h4 mb-1" id="profileName"></h1>
          <p class="text-secondary mb-0" id="profileEmail"></p>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card page-card p-4">
          <h2 class="h5 mb-3">Личные данные</h2>
          <form id="profileForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label" for="pFirstName">Имя</label><input class="form-control" id="pFirstName" required minlength="2" /></div>
              <div class="col-md-6"><label class="form-label" for="pLastName">Фамилия</label><input class="form-control" id="pLastName" required minlength="2" /></div>
              <div class="col-md-6"><label class="form-label" for="pEmail">Email</label><input class="form-control" id="pEmail" type="email" required /></div>
              <div class="col-md-6"><label class="form-label" for="pPhone">Телефон</label><input class="form-control" id="pPhone" required pattern="\+?[0-9\-\s]{10,18}" /></div>
            </div>
            <button class="btn btn-primary mt-3" type="submit">Сохранить</button>
            <div id="profileFeedback"></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
