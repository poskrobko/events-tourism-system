<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card page-card p-4 text-center">
          <img src="https://ui-avatars.com/api/?name=User&background=FFD150&color=3d2a00&size=120" class="rounded-circle mx-auto mb-3" alt="avatar" width="120" height="120" />
          <h1 id="profileName" class="h4 mb-1"></h1>
          <p id="profileEmail" class="text-secondary mb-0"></p>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card page-card p-4 mb-4">
          <h2 class="h5 mb-3">Информация пользователя</h2>
          <form id="profileForm" class="needs-validation" novalidate>
            <div class="row g-3">
              <div class="col-md-6"><input id="profileFirstName" class="form-control" placeholder="Имя" required minlength="2" /></div>
              <div class="col-md-6"><input id="profileLastName" class="form-control" placeholder="Фамилия" required minlength="2" /></div>
              <div class="col-md-6"><input id="profileEmailInput" class="form-control" type="email" required /></div>
              <div class="col-md-6"><input id="profilePhone" class="form-control" type="tel" pattern="\+?[0-9\-\s]{10,18}" required /></div>
            </div>
            <button class="btn btn-primary mt-3" type="submit">Сохранить изменения</button>
            <div data-feedback></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
