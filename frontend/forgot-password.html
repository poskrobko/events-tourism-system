<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div id="mainNavLinks" class="navbar-nav ms-auto gap-2"></div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card page-card p-4">
          <h1 class="page-title h3 mb-3">Восстановить пароль</h1>
          <p class="text-secondary">Введите email, получите код на почту и задайте новый пароль.</p>

          <form id="forgotPasswordForm" class="needs-validation" novalidate data-handled="custom">
            <div class="mb-3">
              <label class="form-label" for="restoreEmail">Email</label>
              <input class="form-control" id="restoreEmail" type="email" required />
              <div class="invalid-feedback">Введите валидный email.</div>
            </div>

            <div id="codeGroup" class="mb-3 d-none">
              <label class="form-label" for="resetCode">Код из письма</label>
              <input class="form-control" id="resetCode" type="text" inputmode="numeric" pattern="\d{6}" maxlength="6" />
              <div class="invalid-feedback">Введите 6-значный код.</div>
            </div>

            <div id="passwordGroup" class="mb-3 d-none">
              <label class="form-label" for="newPassword">Новый пароль</label>
              <input class="form-control" id="newPassword" type="password" minlength="8" />
              <div class="invalid-feedback">Минимум 8 символов.</div>
            </div>

            <button id="requestCodeBtn" class="btn btn-secondary w-100 mt-2" type="button">Отправить код</button>
            <button id="verifyCodeBtn" class="btn btn-outline-secondary w-100 mt-2 d-none" type="button">Проверить код</button>
            <button id="savePasswordBtn" class="btn btn-primary w-100 mt-2 d-none" type="button">Сохранить новый пароль</button>
            <div data-feedback class="mt-3"></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
