<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Безопасность</p>
          <h1 class="page-title h3 mb-3">Восстановить пароль</h1>
          <form id="forgotForm" novalidate>
            <label class="form-label" for="restoreEmail">Email</label>
            <input class="form-control" id="restoreEmail" type="email" required />
            <button class="btn btn-secondary w-100 mt-4" type="submit">Отправить ссылку</button>
            <div id="forgotFeedback"></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
