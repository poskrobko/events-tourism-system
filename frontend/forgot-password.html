<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="events.html">EventFlow</a>
      <div class="navbar-nav ms-auto gap-2">
        <a class="nav-link" href="login.html">Вход</a>
        <a class="nav-link active" href="forgot-password.html">Восстановление</a>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card page-card p-4">
          <p class="section-label mb-2">Безопасность</p>
          <h1 class="page-title h3 mb-3">Восстановить пароль</h1>
          <p class="text-secondary">Введите email, и мы отправим ссылку для сброса пароля.</p>
          <form class="needs-validation" novalidate data-success-message="Письмо отправлено. Проверьте вашу почту.">
            <label class="form-label" for="restoreEmail">Email</label>
            <input class="form-control" id="restoreEmail" type="email" required />
            <div class="invalid-feedback">Введите валидный email.</div>
            <button class="btn btn-secondary w-100 mt-4" type="submit">Отправить ссылку</button>
            <div data-feedback></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
