<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="mainNav"></header>

  <main class="container py-5" id="adminPanel">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
      <div>
        <p class="section-label mb-1">Администрирование</p>
        <h1 class="page-title h2 mb-0">Управление мероприятиями и заказами</h1>
      </div>
    </div>

    <div class="card page-card p-4 mb-4">
      <h2 class="h5 mb-3">CRUD мероприятий + программа + билеты</h2>
      <form id="adminEventForm" novalidate>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label" for="aTitle">Название</label><input class="form-control" id="aTitle" required /></div>
          <div class="col-md-3"><label class="form-label" for="aType">Тип</label><select class="form-select" id="aType" required><option value="бизнес">Бизнес</option><option value="фестиваль">Фестиваль</option><option value="музыка">Музыка</option><option value="творчество">Творчество</option><option value="концерты">Концерты</option></select></div>
          <div class="col-md-3"><label class="form-label" for="aCity">Город</label><input class="form-control" id="aCity" required /></div>
          <div class="col-md-3"><label class="form-label" for="aDate">Дата</label><input class="form-control" id="aDate" type="date" required /></div>
          <div class="col-md-3"><label class="form-label" for="aTime">Время</label><input class="form-control" id="aTime" type="time" required /></div>
          <div class="col-md-3"><label class="form-label" for="aPrice">Цена</label><input class="form-control" id="aPrice" type="number" min="0" required /></div>
          <div class="col-md-3"><label class="form-label" for="aTickets">Кол-во билетов</label><input class="form-control" id="aTickets" type="number" min="0" required /></div>
          <div class="col-12"><label class="form-label" for="aDesc">Описание</label><textarea class="form-control" id="aDesc" rows="2" required></textarea></div>
          <div class="col-12"><label class="form-label" for="aProgram">Программа (каждая строка: время|этап|спикер)</label><textarea class="form-control" id="aProgram" rows="4" required></textarea></div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" type="submit">Сохранить</button>
          <button class="btn btn-outline-secondary" type="button" id="adminReset">Очистить</button>
        </div>
        <div id="adminFeedback"></div>
      </form>
    </div>

    <div class="card page-card p-4 mb-4">
      <h2 class="h5 mb-3">Список мероприятий</h2>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Название</th><th>Тип</th><th>Дата</th><th>Цена</th><th>Билеты</th><th>Действия</th></tr></thead>
          <tbody id="adminEventsTable"></tbody>
        </table>
      </div>
    </div>

    <div class="card page-card p-4">
      <h2 class="h5 mb-3">Заказы пользователей</h2>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead><tr><th>Событие</th><th>Пользователь</th><th>Кол-во</th><th>Сумма</th></tr></thead>
          <tbody id="adminOrdersTable"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
